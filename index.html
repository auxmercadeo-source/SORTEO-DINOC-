<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>Sorteo Moto Eléctrica — DINOC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#060b16; --navy:#0d1730; --navy-light:#16223f;
    --red:#e11d2e; --red-dark:#8c0f1c; --red-glow:#ff4757;
    --gold:#e8c27a;
    --white:#f4f6fb; --muted:#8b96ad;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; width:100%;
    background:
      radial-gradient(circle at 15% 10%, rgba(225,29,46,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(225,29,46,0.08), transparent 45%),
      radial-gradient(circle at 50% 0%, var(--navy-light), var(--navy) 45%, var(--navy-deep) 100%);
    font-family:'Inter', Arial, sans-serif;
    color:var(--white);
    overflow-x:hidden;
  }

  /* Floating ambient orbs */
  .orb{ position:fixed; border-radius:50%; filter:blur(60px); opacity:.35; pointer-events:none; z-index:0; }
  .orb1{ width:380px; height:380px; background:var(--red); top:-120px; left:-100px; animation:float1 16s ease-in-out infinite; }
  .orb2{ width:300px; height:300px; background:#1e3a8a; bottom:-100px; right:-80px; animation:float2 20s ease-in-out infinite; }
  .orb3{ width:220px; height:220px; background:var(--red-glow); bottom:20%; left:8%; opacity:.18; animation:float1 22s ease-in-out infinite reverse; }
  @keyframes float1{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(40px,60px);} }
  @keyframes float2{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(-50px,-40px);} }

  /* subtle grid texture */
  .grid-overlay{
    position:fixed; inset:0; z-index:0; opacity:.05; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);
    background-size:48px 48px;
  }

  .wrap{
    position:relative; z-index:2;
    min-height:100vh; width:100vw;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px;
  }

  .brand{
    display:flex; flex-direction:column; align-items:center; margin-bottom:18px;
  }
  .brand img{
    height:clamp(120px,16vw,220px); margin-bottom:10px;
    filter:drop-shadow(0 4px 18px rgba(225,29,46,0.35));
  }
  h1{
    font-family:'Sora', sans-serif;
    font-size:clamp(22px,3.6vw,42px);
    font-weight:800;
    letter-spacing:3px;
    margin:0 0 6px 0;
    background:linear-gradient(90deg, var(--white), var(--gold) 55%, var(--white));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-transform:uppercase;
  }
  .sub{
    font-size:clamp(12px,1.5vw,16px);
    color:var(--muted);
    letter-spacing:1px;
    margin-bottom:8px;
  }
  .divider{
    width:70px; height:3px; margin:14px auto 26px;
    background:linear-gradient(90deg, transparent, var(--red), transparent);
    border-radius:3px;
  }

  .stage{
    width:min(660px,92vw);
    position:relative;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border:1px solid rgba(225,29,46,0.25);
    border-radius:22px;
    padding:38px 28px 32px;
    box-shadow:
      0 20px 60px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(10px);
  }
  .stage::before{
    content:''; position:absolute; inset:-1px; border-radius:22px; padding:1px;
    background:linear-gradient(135deg, rgba(225,29,46,.6), transparent 30%, transparent 70%, rgba(232,194,122,.4));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
    pointer-events:none;
  }

  .card{
    position:relative; overflow:hidden;
    background:linear-gradient(145deg,#0f1830,#080d1c);
    border-radius:16px;
    padding:30px 20px;
    min-height:130px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,0.06);
  }
  .card::after{
    content:''; position:absolute; top:0; left:-60%; width:50%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.06), transparent);
    transform:skewX(-20deg);
  }
  .card.spinning::after{ animation:shimmer 0.9s linear infinite; }
  @keyframes shimmer{ 0%{left:-60%;} 100%{left:120%;} }

  .factura{
    font-family:'Sora', sans-serif;
    font-size:clamp(24px,3.6vw,36px);
    font-weight:800;
    letter-spacing:1px;
    color:var(--white);
  }
  .cliente{
    font-family:'Inter', sans-serif;
    font-size:clamp(14px,2vw,19px);
    color:var(--muted);
    margin-top:10px;
    min-height:1.4em;
  }
  .winner-label{
    display:none;
    font-size:14px; letter-spacing:5px; color:var(--gold);
    margin-bottom:12px; font-weight:700; text-transform:uppercase;
  }
  .winner .winner-label{ display:block; animation:labelGlow 1.3s ease-in-out infinite; }
  @keyframes labelGlow{
    0%,100%{ text-shadow:0 0 8px rgba(232,194,122,.5); }
    50%{ text-shadow:0 0 26px rgba(232,194,122,1), 0 0 42px rgba(225,29,46,.6); }
  }
  .winner .factura{ color:var(--red-glow); text-shadow:0 0 30px rgba(255,71,87,.6); }
  .winner .cliente{ color:var(--gold); font-weight:600; }
  .winner{
    border-color:rgba(225,29,46,.5);
    animation:
      pop .55s cubic-bezier(.34,1.56,.64,1),
      winnerPulse 1.7s ease-in-out infinite .55s;
  }
  @keyframes pop{ 0%{transform:scale(.82) rotate(-1.5deg);} 55%{transform:scale(1.06) rotate(1deg);} 100%{transform:scale(1) rotate(0);} }
  @keyframes winnerPulse{
    0%,100%{ box-shadow:0 0 24px 2px rgba(225,29,46,.35), inset 0 0 20px rgba(232,194,122,.04); }
    50%{ box-shadow:0 0 58px 12px rgba(225,29,46,.65), inset 0 0 34px rgba(232,194,122,.12); }
  }

  .rays{
    position:absolute; inset:-70%; z-index:0; opacity:0; pointer-events:none;
    background:conic-gradient(from 0deg,
      transparent 0deg, rgba(232,194,122,.35) 6deg, transparent 14deg,
      transparent 60deg, rgba(225,29,46,.28) 66deg, transparent 74deg,
      transparent 140deg, rgba(232,194,122,.3) 146deg, transparent 154deg,
      transparent 220deg, rgba(225,29,46,.25) 226deg, transparent 234deg,
      transparent 300deg, rgba(232,194,122,.3) 306deg, transparent 314deg);
  }
  .winner .rays{ opacity:1; animation:spinRays 9s linear infinite; }
  @keyframes spinRays{ to{ transform:rotate(360deg); } }

  .flash{
    position:fixed; inset:0; z-index:9; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 38%, rgba(255,255,255,.9), rgba(225,29,46,.35) 45%, transparent 72%);
  }
  .flash.active{ animation:flashPulse .7s ease-out; }
  @keyframes flashPulse{ 0%{opacity:0;} 14%{opacity:1;} 100%{opacity:0;} }

  .btn{
    margin-top:30px;
    background:linear-gradient(135deg, var(--red), var(--red-dark));
    border:1px solid rgba(255,255,255,.12);
    color:var(--white); font-weight:700;
    font-family:'Sora', sans-serif;
    font-size:clamp(14px,1.8vw,18px);
    letter-spacing:1px;
    padding:16px 44px; border-radius:40px; cursor:pointer;
    box-shadow:0 10px 30px rgba(225,29,46,.35);
    transition:transform .15s ease, box-shadow .15s ease;
    text-transform:uppercase;
    animation:pulse 2.4s ease-in-out infinite;
  }
  .btn:hover{ transform:translateY(-2px) scale(1.02); box-shadow:0 14px 36px rgba(225,29,46,.5); }
  .btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; animation:none; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 10px 30px rgba(225,29,46,.35);} 50%{ box-shadow:0 10px 40px rgba(225,29,46,.6);} }

  .meta{
    margin-top:20px; font-size:12px; color:#5f6b82; letter-spacing:.3px;
  }

  canvas#confetti{
    position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:5;
  }

  .toggle{
    position:fixed; top:22px; right:26px; font-size:12px; color:var(--muted);
    cursor:pointer; letter-spacing:.5px; z-index:6;
    border:1px solid rgba(255,255,255,.12); padding:8px 14px; border-radius:20px;
    background:rgba(255,255,255,.03); transition:all .2s ease;
  }
  .toggle:hover{ color:var(--white); border-color:rgba(225,29,46,.5); }
  .list-panel{
    position:fixed; top:0; right:0; height:100vh; width:340px;
    background:rgba(6,11,22,0.97); border-left:1px solid rgba(225,29,46,.2);
    transform:translateX(100%); transition:transform .35s ease;
    padding:26px 22px; overflow-y:auto; z-index:10; text-align:left;
  }
  .list-panel.open{ transform:translateX(0); }
  .list-panel h3{ color:var(--red-glow); margin-top:0; font-family:'Sora',sans-serif; letter-spacing:1px; }
  .list-panel table{ width:100%; border-collapse:collapse; font-size:12px; }
  .list-panel td{ padding:5px 3px; border-bottom:1px solid rgba(255,255,255,.06); color:#c7d0dd; }
  .list-panel td:first-child{ color:var(--red-glow); font-weight:700; white-space:nowrap; }

  .count-badge{
    display:inline-flex; gap:18px; margin-top:4px; font-size:12px; color:var(--muted);
  }
  .count-badge b{ color:var(--white); }

  /* ---- Móvil ---- */
  @media (max-width:600px){
    .wrap{ padding:16px 14px; }
    .brand img{ height:96px; margin-bottom:8px; }
    h1{ font-size:24px; letter-spacing:1.5px; line-height:1.15; }
    .sub{ font-size:12.5px; padding:0 6px; }
    .divider{ margin:12px auto 14px; }
    .count-badge{ font-size:11.5px; gap:14px; }
    .stage{ width:100%; padding:22px 16px 20px; border-radius:16px; }
    .card{ padding:22px 14px; min-height:96px; }
    .factura{ font-size:21px; letter-spacing:.5px; word-break:break-word; }
    .cliente{ font-size:13px; }
    .winner-label{ font-size:11px; letter-spacing:2.5px; }
    .btn{ padding:14px 32px; font-size:14px; margin-top:20px; width:100%; }
    .meta{ font-size:10.5px; margin-top:14px; }
    .toggle{ top:10px; right:10px; font-size:10.5px; padding:6px 10px; }
    .list-panel{ width:88vw; padding:20px 16px; }
    .orb1{ width:220px; height:220px; filter:blur(38px); }
    .orb2{ width:180px; height:180px; filter:blur(38px); }
    .orb3{ width:140px; height:140px; filter:blur(30px); }
    .stage{ backdrop-filter:none; background:linear-gradient(180deg, rgba(20,28,50,0.55), rgba(10,15,28,0.5)); }
    .rays{ inset:-40%; }
  }
  @media (max-height:680px){
    html,body{ overflow-y:auto; }
    .wrap{ padding-top:20px; padding-bottom:20px; }
  }
</style>
</head>
<body>

document.getElementById('totalFacturas').textContent = data.length;
document.getElementById('totalClientes').textContent = new Set(data.map(d=>d[1])).size;

const table = document.getElementById('listTable');
data.forEach(([f,c])=>{
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${f}</td><td>${c}</td>`;
  table.appendChild(tr);
});

function secureRandomIndex(max){
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

let drawing = false;
let audioCtx = null;

function unlockAudio(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    // En iOS/Safari el audio solo queda "desbloqueado" si el primer sonido
    // se dispara de forma sincrona dentro del mismo toque/click. Reproducimos
    // un tono casi inaudible ahora mismo para habilitar el audio del resto de la pagina.
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    osc.frequency.value = 440;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.05);
  }catch(e){ /* audio no disponible */ }
}

function playFanfare(){
  if(!audioCtx) return;
  try{
    const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
    let t = audioCtx.currentTime + 0.02;
    notes.forEach((freq, i)=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const dur = i === notes.length - 1 ? 0.55 : 0.16;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.28, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur + 0.02);
      t += 0.14;
    });
  }catch(e){ /* silencioso si falla */ }
}

function startDraw(){
  if(drawing) return;
  drawing = true;
  unlockAudio();
  const btn = document.getElementById('btn');
  const card = document.getElementById('card');
  const facturaEl = document.getElementById('factura');
  const clienteEl = document.getElementById('cliente');
  btn.disabled = true;
  btn.textContent = "Sorteando...";
  card.classList.remove('winner');
  card.classList.add('spinning');

  const winnerIndex = secureRandomIndex(data.length);
  const totalSteps = 40;
  let step = 0;

  function tick(){
    let idx;
    if(step === totalSteps - 1){
      idx = winnerIndex;
    } else {
      idx = secureRandomIndex(data.length);
    }
    facturaEl.textContent = data[idx][0];
    clienteEl.textContent = data[idx][1];
    step++;

    if(step < totalSteps){
      const progress = step / totalSteps;
      const delay = 40 + Math.pow(progress, 3) * 420;
      setTimeout(tick, delay);
    } else {
      card.classList.remove('spinning');
      card.classList.add('winner');
      celebrateWinner();
      btn.disabled = false;
      btn.textContent = "Repetir Sorteo";
      drawing = false;
    }
  }
  tick();
}

// Menos partículas y menos ráfagas en pantallas chicas / equipos modestos para evitar lag
const isLite = window.matchMedia('(max-width: 700px)').matches || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4);
const perf = isLite ? 0.45 : 1;
const MAX_PARTICLES = isLite ? 220 : 420;

function celebrateWinner(){
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(()=>flash.classList.remove('active'), 700);

  playFanfare();

  spawnConfettiBurst(0.5, 0, Math.round(120*perf), 0.32);
  setTimeout(()=>spawnConfettiBurst(0.04, 6.5, Math.round(65*perf), 0.85), 220);
  setTimeout(()=>spawnConfettiBurst(0.96, -6.5, Math.round(65*perf), 0.85), 220);
  setTimeout(()=>spawnConfettiBurst(0.5, 0, Math.round(45*perf), 0.32), 900);

  fireworksShow();
}

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let particles = [];
const CONFETTI_COLORS = ['#e11d2e','#ff4757','#e8c27a','#f4f6fb','#1e3a8a','#ffd166'];

function capParticles(){
  if(particles.length > MAX_PARTICLES){
    particles.splice(0, particles.length - MAX_PARTICLES);
  }
}

function spawnConfettiBurst(originXRatio, biasVX, count, originYRatio){
  for(let i=0;i<count;i++){
    particles.push({
      type:'confetti',
      x: canvas.width*originXRatio + (Math.random()-0.5)*80,
      y: canvas.height*originYRatio,
      vx: biasVX + (Math.random()-0.5)*8,
      vy: Math.random()*-7 - 2,
      g: 0.18 + Math.random()*0.08,
      size: 4 + Math.random()*5,
      color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
      rot: Math.random()*360,
      vr: (Math.random()-0.5)*10,
      life: 130 + Math.random()*40
    });
  }
  capParticles();
}

function fireworkBurst(x, y){
  const colors = ['#e11d2e','#ff4757','#e8c27a','#ffd166','#f4f6fb'];
  const count = Math.round(30*perf);
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2*i)/count + Math.random()*0.25;
    const speed = 2.4 + Math.random()*3.4;
    particles.push({
      type:'firework',
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      g: 0.05,
      size: 2.5 + Math.random()*2.5,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 48 + Math.random()*16,
      maxLife: 64
    });
  }
  capParticles();
}

function fireworksShow(){
  const bursts = isLite ? 3 : 5;
  for(let i=0;i<bursts;i++){
    setTimeout(()=>{
      const x = canvas.width*(0.15 + Math.random()*0.7);
      const y = canvas.height*(0.15 + Math.random()*0.32);
      fireworkBurst(x,y);
    }, 300 + i*480);
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.globalAlpha = 1;
  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    p.vy += p.g;
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    if(p.type === 'firework'){
      // Sin save/restore: mas barato para el navegador cuando hay muchas particulas a la vez
      ctx.globalAlpha = Math.max(p.life / p.maxLife, 0);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
    } else {
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
  particles = particles.filter(p=>{
    if(p.type === 'firework') return p.life > 0;
    return p.life > 0 && p.y < canvas.height + 50;
  });
  requestAnimationFrame(animate);
}
animate();
</script>
